<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaka's Cockpit 👨‍🚀🖍️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Permanent+Marker&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdf6e3;
            --ink: #2d3436;
            --highlight: #ffeaa7;
            --accent: #d63031;
            --sketch: #636e72;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(circle at 2px 2px, rgba(0,0,0,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .hand-drawn {
            border: 2px solid var(--ink);
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 4px 4px 0px var(--sketch);
            background: white;
        }

        .marker { font-family: 'Permanent Marker', cursive; }
        .terminal-font { font-family: 'VT323', monospace; }
        .highlight-bg { background: var(--highlight); padding: 0 4px; }

        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 1.3rem;
            height: 1.3rem;
            border: 2px solid var(--ink);
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            position: relative;
            cursor: pointer;
            background: white;
            border-radius: 4px 8px 3px 6px;
            transform: rotate(-2deg);
        }

        .task-checkbox:checked { background: var(--highlight); }
        .task-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(5deg);
            font-family: 'Permanent Marker', cursive;
            color: var(--accent);
            font-size: 1.4rem;
        }

        .prose ul { list-style-type: none; padding-left: 0; }
        .prose li { margin-bottom: 0.8rem; position: relative; padding-left: 0.5rem; display: flex; align-items: flex-start; }
        .prose li::before { display: none; }
        
        #sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            background: white;
            border: 2px solid var(--ink);
            border-radius: 12px;
            font-family: 'VT323', monospace;
            box-shadow: 4px 4px 0px var(--sketch);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        #sync-status.show { opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center md:text-left">
            <h1 class="marker text-4xl md:text-6xl mb-2 text-[#d63031]">Kaka's Cockpit 👨‍🚀</h1>
            <p class="text-xl terminal-font text-gray-600">MISSION CONTROL // STATUS: <span class="highlight-bg">OPERATIONAL</span></p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Task Board -->
            <section class="task-board hand-drawn p-6 md:p-10">
                <h2 class="marker text-3xl mb-6 border-b-2 border-dashed border-gray-300 pb-2">📋 Objectives</h2>
                <div id="tasks-container" class="prose max-w-none text-lg">
                    <p class="animate-pulse">Loading mission data...</p>
                </div>
            </section>

            <!-- Status Side -->
            <div class="flex flex-col gap-8">
                <section class="armada-status hand-drawn p-6 bg-white">
                    <h2 class="marker text-2xl mb-4">🚀 Armada Status</h2>
                    <pre id="armada-content" class="terminal-font text-lg whitespace-pre-wrap text-gray-600">Initializing...</pre>
                </section>

                <section class="gateway-status hand-drawn p-6 bg-[#2d3436] text-[#ffeaa7]">
                    <h2 class="marker text-2xl mb-4 text-[#d63031]">⚡ Gateway</h2>
                    <pre id="gateway-content" class="terminal-font text-xl">Connecting...</pre>
                </section>
            </div>
        </div>
    </div>

    <div id="sync-status">Synced</div>

    <script>
        const syncStatus = document.getElementById('sync-status');
        
        function showStatus(text, duration = 2000) {
            syncStatus.textContent = text;
            syncStatus.classList.add('show');
            if (duration) {
                setTimeout(() => syncStatus.classList.remove('show'), duration);
            }
        }

        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const data = await res.json();
                document.getElementById('tasks-container').innerHTML = data.html;
            } catch (err) {
                document.getElementById('tasks-container').innerHTML = '<p class="text-red-500">Failed to load tasks.</p>';
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();
                document.getElementById('armada-content').textContent = data.agents || 'No armada data';
                document.getElementById('gateway-content').textContent = data.status || 'Offline';
            } catch (err) {
                console.error('Failed to fetch status');
            }
        }

        document.getElementById('tasks-container').addEventListener('change', async (e) => {
            if (e.target.classList.contains('task-checkbox')) {
                const checkbox = e.target;
                const lineIndex = checkbox.getAttribute('data-line');
                const checked = checkbox.checked;

                showStatus('Saving...', 0);

                try {
                    const res = await fetch('/api/tasks/toggle', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lineIndex: parseInt(lineIndex), checked })
                    });

                    if (res.ok) {
                        showStatus('Synced ✨');
                    } else {
                        showStatus('Error ❌');
                        checkbox.checked = !checked;
                    }
                } catch (err) {
                    showStatus('Connection Error ❌');
                    checkbox.checked = !checked;
                }
            }
        });

        fetchTasks();
        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
